<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="/manifest.json">
<title>刷题营 · StudyCamp</title>
<style>
:root{
  --bg:#FAFAF9; --card:#FFFFFF; --ink:#1C1917; --ink2:#57534E; --ink3:#A8A29E;
  --line:#E7E5E4; --accent:#4F46E5; --accent2:#7C3AED; --accent-soft:#EEF2FF;
  --green:#16A34A; --green-soft:#F0FDF4; --green-line:#BBF7D0;
  --red:#DC2626; --red-soft:#FEF2F2; --red-line:#FECACA;
  --amber:#D97706; --amber-soft:#FFFBEB;
  --r:16px; --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,"SF Pro Text","Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none}
.wrap{max-width:760px;margin:0 auto;padding:0 20px 80px}
/* ---------- topbar ---------- */
.topbar{position:sticky;top:0;z-index:10;background:rgba(250,250,249,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line)}
.topbar-in{max-width:760px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:10px}
.logo{font-weight:800;font-size:18px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;cursor:pointer}
.logo .dot{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;color:#fff;font-size:15px}
.pills{margin-left:auto;display:flex;gap:8px}
.pill{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:99px;font-size:13px;font-weight:700;
  background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow)}
.pill.streak{color:var(--amber)} .pill.xp{color:var(--accent)}
/* ---------- cards / common ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
h1{font-size:26px;letter-spacing:-.03em;margin:28px 0 4px}
.sub{color:var(--ink2);font-size:14.5px;margin-bottom:22px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:560px){.grid4{grid-template-columns:repeat(2,1fr)}}
.stat{padding:16px;text-align:left}
.stat .n{font-size:24px;font-weight:800;letter-spacing:-.02em}
.stat .l{font-size:12.5px;color:var(--ink2);margin-top:2px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
@media(max-width:560px){.actions{grid-template-columns:1fr}}
.action{padding:20px;border-radius:var(--r);text-align:left;transition:transform .12s,box-shadow .12s;
  border:1px solid var(--line);box-shadow:var(--shadow);position:relative;overflow:hidden}
.action:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.09)}
.action:active{transform:translateY(0)}
.action .t{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px}
.action .d{font-size:13.5px;margin-top:4px;opacity:.85}
.action.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none}
.action.warn{background:#fff}
.action.warn .t{color:var(--red)}
.action.plain{background:#fff}
.action .cnt{position:absolute;top:14px;right:16px;font-size:12px;font-weight:800;padding:3px 9px;border-radius:99px;
  background:var(--red-soft);color:var(--red);border:1px solid var(--red-line)}
.section-t{font-size:15px;font-weight:800;margin:26px 0 10px;display:flex;align-items:center;gap:8px}
/* ---------- level ring ---------- */
.level-card{display:flex;align-items:center;gap:18px;padding:18px;margin-top:14px}
.ring{position:relative;width:74px;height:74px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .mid{position:absolute;inset:0;display:grid;place-items:center;font-weight:800;font-size:17px}
.badges{display:flex;flex-wrap:wrap;gap:8px}
.badge{display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:12px;background:var(--card);
  border:1px solid var(--line);font-size:13px;font-weight:700;box-shadow:var(--shadow)}
.badge.locked{opacity:.4;filter:grayscale(1)}
.badge.prov{cursor:pointer;transition:border-color .12s,background .12s}
.badge.prov.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.dot-st{width:8px;height:8px;border-radius:50%;background:var(--ink3);flex:none}
.dot-st.up{background:var(--green)} .dot-st.down{background:var(--red)}
.cfg-grid{display:grid;gap:8px}
.cfg-in{padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font:inherit;font-size:13.5px;width:100%;background:#fff}
.cfg-in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
/* ---------- quiz ---------- */
.quiz-head{display:flex;align-items:center;gap:14px;margin:22px 0 18px}
.qbar{flex:1;height:10px;border-radius:99px;background:var(--line);overflow:hidden}
.qbar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .35s cubic-bezier(.22,1,.36,1)}
.quit{color:var(--ink3);font-size:13px;font-weight:700}
.combo{font-size:13px;font-weight:800;color:var(--amber);min-width:52px;text-align:right}
.qcard{padding:24px;position:relative}
.starbtn{position:absolute;top:16px;right:16px;font-size:24px;line-height:1;color:#D6D3D1;transition:transform .15s,color .15s}
.starbtn.on{color:#F59E0B}
.starbtn:hover{transform:scale(1.2)}
.star-sm{font-size:18px;line-height:1;color:#D6D3D1;flex:none}
.star-sm.on{color:#F59E0B}
.qtype{display:inline-block;font-size:11.5px;font-weight:800;letter-spacing:.04em;padding:4px 10px;border-radius:99px;
  background:var(--accent-soft);color:var(--accent);margin-bottom:12px}
.qtype.multi{background:var(--amber-soft);color:var(--amber)}
.qtype.qa{background:#ECFEFF;color:#0E7490}
.parts{margin-top:10px;display:flex;flex-direction:column;gap:6px;font-size:15px;color:var(--ink2)}
textarea.qa-in{width:100%;min-height:130px;margin-top:16px;padding:14px 16px;border:1.5px solid var(--line);
  border-radius:14px;font:inherit;font-size:15px;resize:vertical;background:#fff;color:var(--ink)}
textarea.qa-in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.judging{display:flex;align-items:center;gap:10px;margin-top:16px;padding:16px;border-radius:14px;
  background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:14px}
.spin{width:18px;height:18px;border:3px solid var(--accent-soft);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;flex:none}
@keyframes spin{to{transform:rotate(360deg)}}
.exp.part{background:var(--amber-soft);border:1px solid #FDE68A}
.exp .h.partt{color:var(--amber)}
.selfgrade{display:flex;gap:10px;margin-top:14px}
.selfgrade .btn{flex:1}
.btn.okline{border:1.5px solid var(--green-line);color:var(--green);background:var(--green-soft)}
.btn.noline{border:1.5px solid var(--red-line);color:var(--red);background:var(--red-soft)}
.btn.suggest{box-shadow:0 0 0 3px rgba(79,70,229,.25)}
.stem{font-size:17.5px;font-weight:700;letter-spacing:-.01em}
.opts{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.opt{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;border-radius:14px;border:1.5px solid var(--line);
  background:#fff;text-align:left;font-size:15px;transition:border-color .12s,background .12s,transform .06s;width:100%}
.opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-soft)}
.opt:active:not(:disabled){transform:scale(.99)}
.opt .k{flex:none;width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-size:13px;font-weight:800;
  background:var(--bg);border:1px solid var(--line)}
.opt.sel{border-color:var(--accent);background:var(--accent-soft)}
.opt.sel .k{background:var(--accent);border-color:var(--accent);color:#fff}
.opt.right{border-color:var(--green);background:var(--green-soft)}
.opt.right .k{background:var(--green);border-color:var(--green);color:#fff}
.opt.wrong{border-color:var(--red);background:var(--red-soft)}
.opt.wrong .k{background:var(--red);border-color:var(--red);color:#fff}
.opt:disabled{cursor:default;color:var(--ink)}
.exp{margin-top:16px;padding:16px;border-radius:14px;font-size:14px;animation:slidein .25s ease}
.exp.ok{background:var(--green-soft);border:1px solid var(--green-line)}
.exp.no{background:var(--red-soft);border:1px solid var(--red-line)}
.exp .h{font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.exp .h.okt{color:var(--green)} .exp .h.not{color:var(--red)}
.exp .ans{font-weight:700;margin-bottom:6px}
.exp .body{color:var(--ink2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:13px 22px;border-radius:13px;
  font-weight:800;font-size:15px;transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.98)}
.btn.solid{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(79,70,229,.35)}
.btn.ghost{background:#fff;border:1.5px solid var(--line)}
.btn:disabled{opacity:.4;cursor:default}
.btn.wide{width:100%;margin-top:16px}
.xp-float{position:fixed;font-weight:800;color:var(--accent);font-size:18px;pointer-events:none;z-index:99;
  animation:floatup 1s ease forwards}
@keyframes floatup{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-46px)}}
@keyframes slidein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* ---------- summary ---------- */
.sum{padding:34px 24px;text-align:center;margin-top:26px}
.sum .big{font-size:40px;font-weight:800;letter-spacing:-.03em}
.sum .row{display:flex;justify-content:center;gap:26px;margin:18px 0}
.sum .cell .n{font-size:21px;font-weight:800}
.sum .cell .l{font-size:12.5px;color:var(--ink2)}
.newbadge{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:99px;margin:4px;
  background:var(--amber-soft);border:1px solid #FDE68A;color:var(--amber);font-weight:800;font-size:14px;
  animation:slidein .4s ease}
/* ---------- wrong book ---------- */
.witem{padding:16px 18px;margin-bottom:10px}
.witem .top{display:flex;align-items:center;gap:10px;cursor:pointer}
.witem .stem2{flex:1;font-size:14.5px;font-weight:700}
.tag{flex:none;font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:99px}
.tag.err{background:var(--red-soft);color:var(--red);border:1px solid var(--red-line)}
.tag.ok{background:var(--green-soft);color:var(--green);border:1px solid var(--green-line)}
.wdetail{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);font-size:13.5px;color:var(--ink2)}
.wdetail b{color:var(--ink)}
/* ---------- import ---------- */
.drop{border:2px dashed var(--line);border-radius:var(--r);padding:44px 20px;text-align:center;color:var(--ink2);
  transition:border-color .15s,background .15s;cursor:pointer;background:#fff}
.drop.over{border-color:var(--accent);background:var(--accent-soft)}
.drop .big-ico{font-size:34px;margin-bottom:8px}
.flist{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.fitem{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:13.5px}
.fitem .ok{color:var(--green);font-weight:700}.fitem .err{color:var(--red);font-weight:700}
.hint{font-size:13px;color:var(--ink3);margin-top:14px;line-height:1.7}
.back{color:var(--accent);font-weight:700;font-size:14px;margin-top:24px;display:inline-block}
.empty{padding:44px;text-align:center;color:var(--ink3)}
.confetti{position:fixed;width:10px;height:10px;z-index:999;pointer-events:none}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-in">
  <div class="logo" onclick="go('home')"><span class="dot">🎯</span>刷题营</div>
  <div class="pills">
    <div class="pill streak">🔥 <span id="pStreak">0</span> 天</div>
    <div class="pill xp">⚡ <span id="pXp">0</span> XP</div>
  </div>
</div></div>
<div class="wrap" id="app"></div>

<script>
/* ================= 状态 ================= */
let bank = [], prog = null, view = 'home', session = null;
let cfg = {provider:'cloud', cloud:{label:'云端 DeepSeek'}, local:{label:'本地 Qwen'}};
const $ = id => document.getElementById(id);
const todayStr = () => new Date().toISOString().slice(0,10);

const defaultProg = () => ({ xp:0, streakDays:0, lastActive:'', badges:[],
  totalAnswered:0, totalCorrect:0, daily:{}, q:{}, favs:[] });

async function boot(){
  bank = await (await fetch('/api/bank')).json();
  let p = await (await fetch('/api/progress')).json();
  prog = Object.keys(p).length ? p : defaultProg();
  prog.favs = prog.favs || [];   // 兼容旧进度
  try{ cfg = await (await fetch('/api/config')).json(); }catch(e){}
  render();
}
async function setProvider(p){
  cfg.provider = p; render();
  await fetch('/api/config', {method:'POST', body:JSON.stringify({provider:p})});
}
function toggleAiCfg(){
  const el = $('aiCfg');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
async function saveAiCfg(){
  const payload = {};
  for(const p of ['cloud','local']){
    payload[p] = {base: $(`cfg-${p}-base`).value, model: $(`cfg-${p}-model`).value,
                  api_key: $(`cfg-${p}-key`).value};
  }
  const r = await (await fetch('/api/config', {method:'POST', body:JSON.stringify(payload)})).json();
  cfg = await (await fetch('/api/config')).json();
  $('cfgMsg').textContent = r.ok ? '已保存 ✓' : '保存失败';
  for(const p of ['cloud','local']) $(`cfg-${p}-key`).value = '';
  loadAiStatus();
  setTimeout(()=>{ const m=$('cfgMsg'); if(m) m.textContent=''; }, 2500);
}
let saveTimer = null;
function persist(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>fetch('/api/progress',{method:'POST',body:JSON.stringify(prog)}), 400);
}
function qstat(id){ return prog.q[id] || (prog.q[id] = {seen:0,right:0,wrong:0,streak:0}); }

/* ================= 奖励体系 ================= */
const LV_XP = 200;
const level = () => Math.floor(prog.xp / LV_XP) + 1;
const lvProgress = () => (prog.xp % LV_XP) / LV_XP;
const BADGES = [
  ['first',   '🌱 初出茅庐', '答对第一题',        p => p.totalCorrect >= 1],
  ['ten',     '🎯 十发十中', '单组全对',          () => false],
  ['combo5',  '🔥 五连击',   '连续答对5题',        () => false],
  ['combo10', '⚡ 十连击',   '连续答对10题',       () => false],
  ['fifty',   '💪 五十题斩', '累计作答50题',       p => p.totalAnswered >= 50],
  ['hundred', '🏆 百题斩',   '累计作答100题',      p => p.totalAnswered >= 100],
  ['streak3', '📅 三日坚持', '连续打卡3天',        p => p.streakDays >= 3],
  ['streak7', '🗓️ 七日老兵', '连续打卡7天',        p => p.streakDays >= 7],
  ['clear',   '🧹 错题清零', '错题本全部掌握',     () => wrongList().length>0 && wrongList().every(q=>qMastered(q.id)) ],
  ['lv5',     '👑 五级学者', '达到5级',           () => level() >= 5],
  ['collect10','📌 收藏家',  '收藏10道题',        p => (p.favs||[]).length >= 10],
];
function checkBadges(extra=[]){
  const got = [];
  for(const [id,name,,fn] of BADGES){
    if(prog.badges.includes(id)) continue;
    if(extra.includes(id) || fn(prog)){ prog.badges.push(id); got.push(name); }
  }
  return got;
}
function touchStreak(){
  const t = todayStr();
  if(prog.lastActive === t) return;
  const y = new Date(Date.now()-864e5).toISOString().slice(0,10);
  prog.streakDays = (prog.lastActive === y) ? prog.streakDays+1 : 1;
  prog.lastActive = t;
}

/* ================= 错题逻辑 ================= */
const qMastered = id => { const s = prog.q[id]; return s && s.wrong>0 && s.streak>=2; };
function wrongList(){ return bank.filter(q => prog.q[q.id] && prog.q[q.id].wrong>0); }
function reviewPool(){ return wrongList().filter(q => !qMastered(q.id)); }

/* ================= 收藏 ================= */
const isFav = id => prog.favs.includes(id);
function toggleFav(id){
  const i = prog.favs.indexOf(id);
  i >= 0 ? prog.favs.splice(i, 1) : prog.favs.push(id);
  checkBadges(); persist(); render();
}
function favList(){ return bank.filter(q => isFav(q.id)); }
function pickFav(n){ return shuffle([...favList()]).slice(0, n); }

const qtype = q => q.type || 'choice';
function qaList(){ return bank.filter(q => qtype(q) === 'qa'); }

/* 错题加权抽样: 错得越多越常出现 */
function pickReinforce(n){
  let pool = reviewPool().map(q => ({q, w: 1 + qstat(q.id).wrong}));
  const out = [];
  while(pool.length && out.length < n){
    let total = pool.reduce((s,x)=>s+x.w, 0), r = Math.random()*total, i = 0;
    while((r -= pool[i].w) > 0) i++;
    out.push(pool[i].q); pool.splice(i,1);
  }
  return out;
}
/* 常规抽样: 未刷过优先, 其次刷得少的 */
function pickLeastSeen(pool, n){
  const sorted = [...pool].sort((a,b)=>{
    const sa = (prog.q[a.id]||{}).seen||0, sb = (prog.q[b.id]||{}).seen||0;
    return sa - sb || Math.random() - .5;
  });
  return shuffle(sorted.slice(0, n));
}
const choiceList = () => bank.filter(q=>qtype(q)!=='qa');
const pickNormal = n => pickLeastSeen(choiceList(), n);
const pickQA = n => pickLeastSeen(qaList(), Math.min(n, 5));   // 问答费时,每组最多5题
const pickSequential = () => choiceList();                    // 按题库顺序, 全部选择题
const pickMock = () => [...shuffle([...choiceList()]).slice(0,70),
                        ...shuffle([...qaList()]).slice(0,30)];  // 模拟考: 70选择+30大题
const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]} return a; };

/* ================= 视图 ================= */
function go(v){ view = v; render(); window.scrollTo({top:0}); }
function render(){
  $('pStreak').textContent = prog.streakDays;
  $('pXp').textContent = prog.xp;
  const fn = {home, quiz:quizView, summary:summaryView, wrong:wrongView, fav:favView, weak:weakView, import:importView, bank:bankView}[view];
  $('app').innerHTML = fn();
  afterRender();
}
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;');

function home(){
  const wl = wrongList(), pending = reviewPool().length;
  const acc = prog.totalAnswered ? Math.round(prog.totalCorrect/prog.totalAnswered*100) : 0;
  const lv = level(), pct = Math.round(lvProgress()*100);
  const circ = 2*Math.PI*32;
  return `
  <h1>${greeting()}</h1>
  <div class="sub">今天也是稳步上岸的一天。题库 ${bank.length} 题已就绪。</div>
  <div class="grid4">
    <div class="card stat"><div class="n">${bank.length}</div><div class="l">题库总题数</div></div>
    <div class="card stat"><div class="n">${prog.totalAnswered}</div><div class="l">累计作答</div></div>
    <div class="card stat"><div class="n">${acc}%</div><div class="l">总正确率</div></div>
    <div class="card stat"><div class="n" style="color:${pending?'var(--red)':'var(--green)'}">${pending}</div><div class="l">待强化错题</div></div>
  </div>
  <div class="actions">
    <button class="action primary" onclick="startSession('normal')">
      <div class="t">▶ 刷选择题</div><div class="d">每组 10 题 · 优先未刷过的题</div></button>
    <button class="action warn" onclick="startSession('reinforce')" ${pending?'':'disabled style="opacity:.45"'}>
      ${pending?`<span class="cnt">${pending}</span>`:''}
      <div class="t">♻ 错题强化</div><div class="d">${pending?'错得越多出现越频繁，连对2次出本':'暂无待强化错题 🎉'}</div></button>
    <button class="action plain" onclick="startSession('qa')" ${qaList().length?'':'disabled style="opacity:.45"'}>
      <div class="t">✍️ 问答抽查</div><div class="d">${qaList().length?qaList().length+' 道问答 · 逐小问作答 + AI 判卷':'导入问答资料后可用'}</div></button>
    <button class="action plain" onclick="startSession('sequential')" ${choiceList().length?'':'disabled style="opacity:.45"'}>

const greeting = () => { const h = new Date().getHours();
  return h<5?'夜深了，刷一组就睡':h<12?'早上好 ☀️':h<18?'下午好 🌤️':'晚上好 🌙'; };

/* ================= 刷题 ================= */
function startSession(mode, customQs){
  if(!bank.length){ alert('题库为空，请先导入题目（首页 → 📥 导入资料）或检查 data/bank.json 是否存在'); return; }
  const qs = customQs ? customQs
           : mode==='reinforce' ? pickReinforce(10) : mode==='fav' ? pickFav(10)
           : mode==='qa' ? pickQA(5) : mode==='sequential' ? pickSequential()
           : mode==='mock' ? pickMock() : pickNormal(10);
  if(!qs.length){ alert(mode==='qa'?'暂无问答题，请先导入问答资料':'暂无可用题目'); return; }
  // splitParts: 仅"问答抽查/知识点突击"逐小问作答; 模拟考按整道大题作答(大题并非子问题)
  session = {mode, qs, i:0, right:0, xp:0, combo:0, maxCombo:0, sel:new Set(),
             done:false, newBadges:[], text:'', judging:false, ai:null,
             splitParts: (mode==='qa' || mode==='weakqa'), startedAt: Date.now()};
  initQA();
  go('quiz');
}
/* 进入一道问答题时重置逐小问状态 */
function initQA(){
  const s = session, q = s.qs[s.i];
  s.partIdx = 0; s.partText = {}; s.partGrade = {}; s.partRefShown = false;
  s.refSegs = null;
}
/* 把整道大题的参考答案按（1）（2）…拆成每小问一段 */
function splitRef(text, n){
  if(!text) return null;
  const re = /[（(]\s*\d+\s*[）)]/g, idxs = []; let m;
  while((m = re.exec(text))) idxs.push(m.index);
  if(idxs.length < 2) return null;
  const segs = [];
  for(let i=0;i<idxs.length;i++)
    segs.push(text.slice(idxs[i], i+1<idxs.length?idxs[i+1]:undefined).trim());
  return segs;
}
const isSplitQA = (s,q) => s.splitParts && qtype(q)==='qa' && (q.parts||[]).length>1;
function quizView(){
  const s = session, q = s.qs[s.i];
  if(qtype(q) === 'qa') return isSplitQA(s,q) ? qaSplitView(s,q) : qaQuizView(s, q);
  const opts = Object.entries(q.options);
  return `
  ${quizHead(s)}
  <div class="card qcard">
    <button class="starbtn ${isFav(q.id)?'on':''}" title="${isFav(q.id)?'取消收藏':'收藏这道题'}" onclick="toggleFav('${q.id}')">${isFav(q.id)?'★':'☆'}</button>
    <span class="qtype ${q.multi?'multi':''}">${q.multi?'多选题 · 选完点提交':'单选题'}</span>
    <div class="stem">${esc(q.stem)}</div>
    <div class="opts">${opts.map(([k,v])=>{
      let cls = '', dis = s.done ? 'disabled' : '';
      if(s.done){
        if(q.answer.includes(k)) cls = 'right';
        else if(s.sel.has(k)) cls = 'wrong';
      } else if(s.sel.has(k)) cls = 'sel';
      return `<button class="opt ${cls}" ${dis} onclick="choose('${k}')">
        <span class="k">${k}</span><span>${esc(v)}</span></button>`;}).join('')}
    </div>
    ${q.multi && !s.done ? `<button class="btn solid wide" ${s.sel.size?'':'disabled'} onclick="submitMulti()">提交答案</button>` : ''}
    ${s.done ? feedback(q) : ''}
    ${s.done ? nextBtn(s) : ''}
  </div>`;
}
function quizHead(s){
  return `<div class="quiz-head">
    <button class="quit" onclick="go('home')">✕ 退出</button>
    <div class="qbar"><i style="width:${(s.i+(s.done?1:0))/s.qs.length*100}%"></i></div>
    <div style="font-size:13px;font-weight:700;color:var(--ink2)">${s.i+1}/${s.qs.length}</div>
    <div class="combo">${s.combo>=2?'🔥×'+s.combo:''}</div>
  </div>`;
}
const nextBtn = s => `<button class="btn solid wide" onclick="nextQ()">${s.i+1 < s.qs.length ? '下一题 →' : '查看本组成绩 🏁'}</button>`;

/* ---------- 问答题(逐小问): 一次只答一个小问, 答完才出该小问答案 ---------- */
function qaSplitView(s, q){
  const parts = q.parts || [], n = parts.length, pi = s.partIdx;
  const shown = s.partRefShown, graded = s.partGrade[pi] !== undefined;
  // 优先用题库里逐小问对齐的答案; 没有(如AI生成的整段ref)则按(N)拆
  const seg = (q.answers && q.answers[pi]) || (s.refSegs && s.refSegs[pi]) || s.refWhole || '';
  const last = pi === n - 1;
  return `
  ${quizHead(s)}
  <div class="card qcard">
    <button class="starbtn ${isFav(q.id)?'on':''}" title="${isFav(q.id)?'取消收藏':'收藏这道题'}" onclick="toggleFav('${q.id}')">${isFav(q.id)?'★':'☆'}</button>
    <span class="qtype qa">问答题 · 小问 ${pi+1}/${n}</span>
    <div class="stem">${esc(q.stem)}</div>
    <div class="parts"><div style="font-weight:800;color:var(--ink)">${esc(parts[pi])}</div></div>
    <textarea class="qa-in" id="qaText" placeholder="回答本小问…"
      oninput="session.partText[${pi}]=this.value" ${shown?'disabled':''}>${esc(s.partText[pi]||'')}</textarea>
    ${!shown ? `
      <button class="btn solid wide" onclick="showPartAnswer(false)">提交，看本小问答案 📖</button>
      <button class="btn ghost wide" onclick="showPartAnswer(true)" style="margin-top:8px">不会，看答案</button>` : ''}
    ${s.partLoading ? `<div class="judging"><span class="spin"></span>正在生成参考答案…</div>` : ''}
    ${shown ? `<div class="exp ok"><div class="h okt">📖 第（${pi+1}）小问参考答案</div>
      <div class="body" style="white-space:pre-wrap">${esc(seg || '（未能单独拆出本小问答案，下面是整题参考）\n'+(s.refWhole||''))}</div></div>` : ''}
    ${shown && !graded ? `<div class="selfgrade">
      <button class="btn okline" onclick="gradePart(true)">✓ 这问答对了</button>
      <button class="btn noline" onclick="gradePart(false)">✗ 没答对</button></div>` : ''}
    ${shown && graded ? `<div class="exp ${s.partGrade[pi]?'ok':'no'}"><div class="h ${s.partGrade[pi]?'okt':'not'}">${s.partGrade[pi]?'✓ 本小问记为答对':'✗ 本小问记为答错'}</div></div>
      <button class="btn solid wide" onclick="nextPart()">${last?'完成本题 ✓':'下一小问 →'}</button>` : ''}
  </div>`;
}
async function showPartAnswer(skip){
  const s = session, q = s.qs[s.i];
  if(skip) s.partText[s.partIdx] = '';
  // 题库自带逐小问答案 → 直接显示, 无需联网
  const hasLocal = q.answers && q.answers[s.partIdx];
  if(!hasLocal && !s.refWhole){   // 整题参考答案只取一次, 然后按小问拆分
    s.partLoading = true; render();
    try{
      const r = await (await fetch('/api/answer', {method:'POST', body:JSON.stringify({id:q.id})})).json();
      if(r.ok){ s.refWhole = r.ref; s.refSegs = splitRef(r.ref, (q.parts||[]).length); }
      else { s.refWhole = '（参考答案生成失败：'+(r.error||'')+'）'; }
    }catch(e){ s.refWhole = '（参考答案获取失败：'+e+'）'; }
    s.partLoading = false;
  }
  s.partRefShown = true; render();
}
function gradePart(ok){ session.partGrade[session.partIdx] = ok; render(); }
function nextPart(){
  const s = session, q = s.qs[s.i], n = (q.parts||[]).length;
  if(s.partIdx < n - 1){ s.partIdx++; s.partRefShown = false; render(); }
  else {   // 全部小问完成 → 整道大题按"全部小问答对才算对"计分
    const allOk = q.parts.every((_,i)=>s.partGrade[i]);
    s.text = q.parts.map((p,i)=>`${p} 我答:${s.partText[i]||'(空)'} [${s.partGrade[i]?'对':'错'}]`).join('\n');
    finalize(allOk);
  }
}

/* ---------- 问答题(整题): 提交→先看参考答案→自选AI判卷 ---------- */
function qaQuizView(s, q){
  const ai = s.ai, ref = s.ref, busy = s.refLoading || s.judging;
  const canJudge = ref && !ai && !s.judging && !s.done && (s.text||'').trim();
  return `
  ${quizHead(s)}
  <div class="card qcard">
    <button class="starbtn ${isFav(q.id)?'on':''}" title="${isFav(q.id)?'取消收藏':'收藏这道题'}" onclick="toggleFav('${q.id}')">${isFav(q.id)?'★':'☆'}</button>
    <span class="qtype qa">问答题</span>
    <div class="stem">${esc(q.stem)}</div>
    ${(q.parts||[]).length ? `<div class="parts">${q.parts.map(p=>`<div>${esc(p)}</div>`).join('')}</div>` : ''}
    <textarea class="qa-in" id="qaText" placeholder="凭记忆作答，可分点写（1）（2）（3）…"
      oninput="session.text=this.value;var b=document.getElementById('submitBtn');if(b)b.disabled=!this.value.trim()" ${busy||ref?'disabled':''}>${esc(s.text||'')}</textarea>
    ${!ref && !s.refLoading ? `
      <button id="submitBtn" class="btn solid wide" onclick="showAnswer(false)" ${(s.text||'').trim()?'':'disabled'}>提交，看参考答案 📖</button>
      <button class="btn ghost wide" onclick="showAnswer(true)" style="margin-top:8px">不会，直接看答案</button>` : ''}
    ${s.refLoading ? `<div class="judging"><span class="spin"></span>正在联网搜索并生成参考答案…（生成一次后会缓存，下次秒出）</div>` : ''}
    ${ref ? refCard(ref) : ''}
    ${canJudge ? `<button class="btn ghost wide" onclick="judgeQA()">🤖 让 AI 对照判卷（${cfg[cfg.provider].label}）</button>` : ''}
    ${s.judging ? `<div class="judging"><span class="spin"></span>AI 正在对照批改你的回答…</div>` : ''}
    ${ai ? aiCard(ai) : ''}
    ${ref && !s.judging && !s.done ? `<div class="selfgrade">
      <button class="btn okline ${ai&&ai.score>=60?'suggest':''}" onclick="finalize(true)">✓ 我答对了</button>
      <button class="btn noline ${(ai&&!(ai.score>=60))||!(s.text||'').trim()?'suggest':''}" onclick="finalize(false)">✗ 没答对</button></div>` : ''}
    ${s.done ? nextBtn(s) : ''}
  </div>`;
}
function refCard(ref){
  if(ref.error) return `<div class="exp no"><div class="h not">⚠️ 参考答案生成失败</div>
    <div class="body">${esc(ref.error)}<br>可切换 AI 模型后重试，或直接自评。</div></div>`;
  return `<div class="exp ok"><div class="h okt">📖 参考答案
    <span style="font-weight:600;opacity:.7">${ref.ai_generated ? (ref.cached?'· AI 生成(已缓存)':'· AI 联网生成'+(ref.searched?'，检索 '+ref.searched+' 条资料':'')) : '· 题库自带'}</span></div>
    <div class="body" style="white-space:pre-wrap">${esc(ref.text||'')}</div></div>`;
}
async function showAnswer(skip){
  const s = session, q = s.qs[s.i];
  if(skip) s.text = '';
  if(!skip && !(s.text||'').trim()) return;
  s.refLoading = true; render();
  try{
    const r = await (await fetch('/api/answer', {method:'POST',
      body:JSON.stringify({id:q.id})})).json();
    s.ref = r.ok ? {text:r.ref, cached:r.cached, ai_generated:r.ai_generated, searched:r.searched} : {error:r.error};
  }catch(e){ s.ref = {error:''+e}; }
  s.refLoading = false; render();
}
async function judgeQA(){
  const s = session, q = s.qs[s.i];
  s.judging = true; render();
  try{
    const r = await (await fetch('/api/judge', {method:'POST', body:JSON.stringify({
      stem:q.stem, parts:q.parts||[], ref:(s.ref&&s.ref.text)||'',
      user_answer:s.text.trim()})})).json();
    s.ai = r.ok ? r : {error:r.error||'判卷失败'};
  }catch(e){ s.ai = {error:''+e}; }
  s.judging = false; render();
}
function aiCard(ai){
  if(ai.error) return `<div class="exp no"><div class="h not">⚠️ AI 判卷不可用</div>
    <div class="body">${esc(ai.error)}<br>请对照资料自评，点下方按钮记录对错。</div></div>`;
  const cls = ai.verdict==='正确' ? ['ok','okt'] : ai.verdict==='错误' ? ['no','not'] : ['part','partt'];
  return `<div class="exp ${cls[0]}">
    <div class="h ${cls[1]}">🤖 AI 判卷：${esc(ai.verdict||'')} · ${ai.score!=null?ai.score+' 分':''}
      <span style="font-weight:600;opacity:.7">${ai.searched?`· 已联网检索 ${ai.searched} 条资料`:'· 未联网，凭模型知识'}</span></div>
    <div class="body" style="white-space:pre-wrap">${esc(ai.comment||'')}</div></div>`;
}
function feedback(q){
  const ok = session.lastOk;
  return `<div class="exp ${ok?'ok':'no'}">
    <div class="h ${ok?'okt':'not'}">${ok?'✓ 回答正确':'✗ 回答错误'} ${ok&&session.combo>=2?`· 连击 ×${session.combo}`:''}</div>
    <div class="ans">正确答案：${q.answer.join('')}</div>
    <div class="body">${esc(q.explanation || '本题暂无解析')}</div></div>`;
}
function choose(k){
  const s = session, q = s.qs[s.i];
  if(s.done) return;
  if(q.multi){ s.sel.has(k) ? s.sel.delete(k) : s.sel.add(k); render(); }
  else { s.sel = new Set([k]); grade(); }
}
function submitMulti(){ if(session.sel.size) grade(); }
function grade(){
  const s = session, q = s.qs[s.i];
  finalize(q.answer.length === s.sel.size && q.answer.every(a=>s.sel.has(a)));
}
function finalize(ok){
  const s = session, q = s.qs[s.i];
  const st = qstat(q.id); st.seen++;
  touchStreak();
  prog.totalAnswered++;
  const d = prog.daily[todayStr()] = prog.daily[todayStr()] || {a:0,c:0};
  d.a++;
  if(ok){
    st.right++; st.streak++;
    prog.totalCorrect++; d.c++;
    s.right++; s.combo++; s.maxCombo = Math.max(s.maxCombo, s.combo);
    let gain = qtype(q)==='qa' ? 20 : q.multi ? 15 : 10;
    if(s.combo >= 5) gain *= 2;
    prog.xp += gain; s.xp += gain;
    floatXp('+'+gain+' XP');
  } else {
    st.wrong++; st.streak = 0;
    s.combo = 0;
    prog.xp += 2; s.xp += 2;   // 参与分
  }
  if(qtype(q)==='qa'){   // 留档供错题本/收藏夹复习
    st.lastAns = (s.text||'').slice(0,500);
    if(s.ai && s.ai.comment) st.ai = s.ai.comment.slice(0,1200);
  }
  const extra = [];
  if(s.combo >= 5)  extra.push('combo5');
  if(s.combo >= 10) extra.push('combo10');
  s.newBadges.push(...checkBadges(extra));
  s.done = true; s.lastOk = ok;
  persist(); render();
}
function nextQ(){
  const s = session;
  if(s.i+1 < s.qs.length){ s.i++; s.sel = new Set(); s.done = false;
    s.text = ''; s.judging = false; s.ai = null; s.ref = null; s.refLoading = false;
    s.refWhole = null; s.refSegs = null; s.partLoading = false; initQA(); render(); }
  else {
    if(s.right === s.qs.length && s.qs.length >= 5) s.newBadges.push(...checkBadges(['ten']));
    s.newBadges.push(...checkBadges());
    persist(); go('summary');
    if(s.right/s.qs.length >= .8 || s.newBadges.length) confetti();
  }
}
const MODE_NAME = {reinforce:'错题强化', fav:'收藏练习', qa:'问答抽查',
  sequential:'顺序练习', mock:'模拟考试', weak:'薄弱突击', weakqa:'薄弱突击', normal:'常规练习'};
function summaryView(){
  const s = session, acc = Math.round(s.right/s.qs.length*100);
  const isMock = s.mode === 'mock';
  const mins = s.startedAt ? Math.round((Date.now()-s.startedAt)/60000) : 0;
  const pass = acc >= 60;
  return `<div class="card sum">
    <div style="font-size:42px">${isMock?(pass?'🎓':'📕'):acc===100?'🏆':acc>=80?'🎉':acc>=60?'💪':'📖'}</div>

    <div style="color:var(--ink2);font-weight:600">${MODE_NAME[s.mode]||'练习'} · ${isMock?(pass?'达到及格线（60%）✓':'未及格，继续努力'):acc===100?'完美一组！':acc>=80?'非常棒！':'错题已记入错题本'}${isMock&&mins?` · 用时 ${mins} 分钟`:''}</div>
    <div class="row">
      <div class="cell"><div class="n" style="color:var(--green)">${s.right}</div><div class="l">答对</div></div>
      <div class="cell"><div class="n" style="color:var(--red)">${s.qs.length-s.right}</div><div class="l">答错</div></div>
      <div class="cell"><div class="n" style="color:var(--accent)">+${s.xp}</div><div class="l">获得 XP</div></div>
      <div class="cell"><div class="n" style="color:var(--amber)">×${s.maxCombo}</div><div class="l">最高连击</div></div>
    </div>
    ${s.newBadges.length?`<div style="margin-bottom:14px">${s.newBadges.map(b=>`<span class="newbadge">🎖 解锁 ${b}</span>`).join('')}</div>`:''}
    <button class="btn solid" onclick="startSession('${s.mode}')">再来一组</button>
    <button class="btn ghost" onclick="go('home')" style="margin-left:8px">回到首页</button>
  </div>`;
}

/* ================= 薄弱点突击 ================= */
let kpCache = {}, kpLoading = {};
async function loadKP(id){
  if(kpCache[id] || kpLoading[id]) return;
  kpLoading[id] = true; render();
  try{
    const r = await (await fetch('/api/explain', {method:'POST', body:JSON.stringify({id})})).json();
    kpCache[id] = r.ok ? r.kp : ('讲解生成失败：' + (r.error||''));
  }catch(e){ kpCache[id] = '讲解获取失败：' + e; }
  kpLoading[id] = false; render();
}
function weakView(){
  const weak = wrongList().sort((a,b)=>qstat(b.id).wrong - qstat(a.id).wrong);
  const wc = weak.filter(q=>qtype(q)!=='qa'), wq = weak.filter(q=>qtype(q)==='qa');
  return `<h1>💥 薄弱点突击</h1>
  <div class="sub">${weak.length?`你做错过的 ${weak.length} 个知识点（${wc.length} 选择 / ${wq.length} 问答），按错误次数排序。点「📚 知识点精讲」让 AI 给出标准讲解，彻底吃透。`:'还没有薄弱点——做错题后这里会自动归纳。'}</div>
  ${weak.length?`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px">
    ${wc.length?`<button class="btn solid" onclick="startSession('weak', shuffle(wrongList().filter(q=>qtype(q)!=='qa')))">💥 突击选择题（${wc.length}）</button>`:''}
    ${wq.length?`<button class="btn ghost" onclick="startSession('weakqa', shuffle(wrongList().filter(q=>qtype(q)==='qa')))">✍️ 突击问答题（${wq.length}）</button>`:''}
  </div>`:''}
  ${weak.length ? weak.map(q=>weakItem(q)).join('') : '<div class="card empty">🎉 暂无薄弱点，保持下去！</div>'}
  <a class="back" onclick="go('home')">← 返回首页</a>`;
}
function weakItem(q){
  const st = qstat(q.id), kp = kpCache[q.id], loading = kpLoading[q.id];
  return `<div class="card witem">
    <div class="top" onclick="toggleW(this)">
      <span class="tag err">错 ${st.wrong} 次</span>
      <span class="stem2">${esc(q.stem)}</span>
      <button class="star-sm ${isFav(q.id)?'on':''}" onclick="event.stopPropagation();toggleFav('${q.id}')">${isFav(q.id)?'★':'☆'}</button>
      <span style="color:var(--ink3)">▾</span></div>
    <div class="wdetail" style="display:none">
      ${qtype(q)==='qa'
        ? `${(q.parts||[]).map(p=>`<div>${esc(p)}</div>`).join('')}${q.ref?`<div style="margin-top:8px;white-space:pre-wrap"><b>参考答案：</b>${esc(q.ref)}</div>`:''}`
        : `${Object.entries(q.options).map(([k,v])=>`<div>${q.answer.includes(k)?'<b>✓ '+k+'. '+esc(v)+'</b>':k+'. '+esc(v)}</div>`).join('')}
           <div style="margin-top:8px"><b>解析：</b>${esc(q.explanation||'无')}</div>`}
      <div style="margin-top:12px">
        ${kp ? `<div class="exp ok" style="margin-top:0"><div class="h okt">📚 知识点精讲</div>
                 <div class="body" style="white-space:pre-wrap">${esc(kp)}</div></div>`
          : loading ? `<div class="judging"><span class="spin"></span>AI 正在联网整理这个知识点的标准讲解…</div>`
          : `<button class="btn ghost" onclick="loadKP('${q.id}')">📚 AI 知识点精讲（${cfg[cfg.provider].label}）</button>`}

/* ================= 题库汇总 ================= */
/* 题型识别: 单选 / 多选 / 判断(两个"正确/错误"型选项) / 问答 */
const isJudge = q => { if(qtype(q) !== 'choice') return false;
  const v = Object.values(q.options || {});
  return v.length === 2 && v.every(x => /^(正确|错误|对|错|是|否|√|×|对的|错的)$/.test((x||'').trim())); };
const typeKey = q => qtype(q) === 'qa' ? 'qa' : isJudge(q) ? 'judge' : q.multi ? 'multi' : 'single';
const TYPE_ORDER = ['single','multi','judge','qa'];
const TYPE_NAMES = {single:'单选题', multi:'多选题', judge:'判断题', qa:'问答题'};
const TYPE_ICONS = {single:'🔘', multi:'☑️', judge:'⚖️', qa:'✍️'};

let bankUI = {kw:'', open:{}, sel:{}};
let _chapters = [];   // 当前渲染的章节缓存(供 onclick 按索引引用, 避免文件名引号问题)   // kw=检索词 open[章节]=展开 sel[章节]=Set(已勾选题型)

const natCmp = (a,b) => a.localeCompare(b, 'zh-Hans-CN', {numeric:true});
function chapterList(){
  const map = new Map();
  for(const q of bank){
    const src = q.source || '未知来源';
    if(!map.has(src)) map.set(src, []);
    map.get(src).push(q);
  }
  return [...map.entries()].map(([src, qs]) => ({src, qs}))
                           .sort((x,y)=>natCmp(x.src, y.src));   // 章节按文件名自然序
}
const qMatch = (q, kw) => {
  if(!kw) return true;
  const hay = [q.stem, q.explanation||'', ...(q.parts||[]),
               ...Object.entries(q.options||{}).map(([k,v])=>k+'.'+v)].join('\n').toLowerCase();
  return kw.toLowerCase().split(/\s+/).every(w => hay.includes(w));
};
function chSel(src){ return bankUI.sel[src] || (bankUI.sel[src] = new Set()); }

function bankView(){
  const kw = bankUI.kw.trim();
  const chapters = chapterList().map(c => ({...c, hit: c.qs.filter(q => qMatch(q, kw))}))
                                .filter(c => !kw || c.hit.length);
  const totalHit = chapters.reduce((s,c)=>s+c.hit.length, 0);
  _chapters = chapters;
  return `<h1>🗂 题库汇总</h1>
  <div class="sub">共 ${bank.length} 题 · ${chapterList().length} 个章节（每个导入文件为一章）。${kw?`检索到 <b>${totalHit}</b> 题。`:'勾选题型可批量删除。'}</div>
  <input class="cfg-in" id="bankKw" value="${esc(bankUI.kw)}" placeholder="🔍 检索题干 / 选项 / 解析，空格分隔多个关键词"
    oninput="bankUI.kw=this.value;renderBankKeepFocus()" style="margin-bottom:16px;padding:13px 16px;font-size:14.5px">
  ${chapters.length ? chapters.map((c,i) => chapterCard(c, kw, i)).join('')
    : `<div class="card empty">${kw ? '😶 没有匹配的题目，换个关键词试试' : '题库为空，先去 📥 导入资料'}</div>`}
  <a class="back" onclick="go('home')">← 返回首页</a>`;
}

function chapterCard(c, kw, i){
  const {src, qs, hit} = c;
  const open = kw ? true : !!bankUI.open[src];   // 检索时自动展开
  const sel = chSel(src);
  const cnt = {};
  for(const q of qs) cnt[typeKey(q)] = (cnt[typeKey(q)]||0) + 1;
  const selN = qs.filter(q => sel.has(typeKey(q))).length;
  const shown = open ? (kw ? hit : qs) : [];
  return `<div class="card" style="margin-bottom:14px;overflow:hidden">
    <div style="padding:16px 18px;display:flex;align-items:center;gap:10px;cursor:pointer"
      onclick="bankToggleOpen(${i})">
      <span style="font-size:20px">📁</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:15px;word-break:break-all">${esc(src)}</div>
        <div style="font-size:12.5px;color:var(--ink2)">${qs.length} 题${kw?` · 命中 ${hit.length} 题`:''}</div>
      </div>
      <button class="btn ghost" style="padding:8px 14px;font-size:13px;color:var(--red)"
        onclick="event.stopPropagation();delChapter(${i})">🗑 删除整章</button>
      <span style="color:var(--ink3)">${open?'▴':'▾'}</span>
    </div>
    <div style="padding:0 18px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
      ${TYPE_ORDER.filter(t=>cnt[t]).map(t => `
        <button class="badge prov ${sel.has(t)?'on':''}" style="padding:7px 12px;font-size:12.5px"
          onclick="toggleTypeSel(${i},'${t}')">
          ${sel.has(t)?'✅':TYPE_ICONS[t]} ${TYPE_NAMES[t]} <b>${cnt[t]}</b></button>`).join('')}
      <button class="btn ghost" style="padding:7px 14px;font-size:12.5px;color:var(--red);${selN?'':'opacity:.4;pointer-events:none'}"
        onclick="delSelectedTypes(${i})">🗑 删除选中题型（${selN} 题）</button>
    </div>
    ${shown.length ? `<div style="padding:0 14px 14px">${shown.map(q => bankQItem(q)).join('')}</div>` : ''}
  </div>`;
}

function bankQItem(q){
  const t = typeKey(q), st = prog.q[q.id];
  const stat = st && st.seen ? `刷 ${st.seen} 次 · 对 ${st.right} 错 ${st.wrong}` : '未刷过';
  return `<div class="card witem" style="box-shadow:none;margin-bottom:8px">
    <div class="top" onclick="toggleW(this)">
      <span class="tag ${t==='qa'?'ok':'err'}" style="background:var(--accent-soft);color:var(--accent);border:1px solid var(--line)">${TYPE_NAMES[t]}</span>
      <span class="stem2">${esc(q.stem)}</span>
      <button class="star-sm" title="删除这道题" style="color:var(--ink3)"
        onclick="event.stopPropagation();delOne('${q.id}')">🗑</button>
      <span style="color:var(--ink3)">▾</span></div>
    <div class="wdetail" style="display:none">
      ${qtype(q)==='qa' ? `${(q.parts||[]).map(p=>`<div>${esc(p)}</div>`).join('')}
        ${q.ref?`<div style="margin-top:8px;white-space:pre-wrap"><b>参考答案：</b>${esc(q.ref)}</div>`:''}`
      : `${Object.entries(q.options).map(([k,v])=>`<div>${q.answer.includes(k)?'<b>✓ '+k+'. '+esc(v)+'</b>':k+'. '+esc(v)}</div>`).join('')}
        <div style="margin-top:8px"><b>解析：</b>${esc(q.explanation||'无')}</div>`}
      <div style="margin-top:6px;color:var(--ink3)">${stat} · 来源：${esc(q.source||'未知')}</div>
    </div></div>`;
}

/* 检索框输入后保持焦点不丢 */
function renderBankKeepFocus(){
  const pos = $('bankKw').selectionStart;
  render();
  const el = $('bankKw');
  if(el){ el.focus(); el.setSelectionRange(pos, pos); }
}
function bankToggleOpen(i){
  const src = _chapters[i].src;
  bankUI.open[src] = !bankUI.open[src];
  render();
}
function toggleTypeSel(i, t){
  const s = chSel(_chapters[i].src);
  s.has(t) ? s.delete(t) : s.add(t);
  render();
}
function delChapter(i){
  const src = _chapters[i].src;
  const ids = bank.filter(q => (q.source||'未知来源') === src).map(q => q.id);
  return doDelete(ids, `整章「${src}」`);
}
function delSelectedTypes(i){
  const src = _chapters[i].src;
  const sel = chSel(src);
  const ids = bank.filter(q => (q.source||'未知来源') === src && sel.has(typeKey(q))).map(q => q.id);
  const names = TYPE_ORDER.filter(t=>sel.has(t)).map(t=>TYPE_NAMES[t]).join('、');
  return doDelete(ids, `「${src}」中的 ${names}`);
}
function delOne(id){
  const q = bank.find(x => x.id === id);
  return doDelete([id], `这道题（${(q?q.stem:'').slice(0,20)}…）`);
}
async function doDelete(ids, label){
  if(!ids.length) return;
  if(!confirm(`确定删除 ${label} 吗？\n共 ${ids.length} 题，相关刷题记录一并清除，删除后不可恢复。`)) return;
  try{
    const r = await (await fetch('/api/delete', {method:'POST', body:JSON.stringify({ids})})).json();
    if(!r.ok){ alert('删除失败：' + (r.error||'未知错误')); return; }
    const dead = new Set(ids);
    bank = bank.filter(q => !dead.has(q.id));
    for(const id of ids) delete prog.q[id];                 // 清掉刷题记录
    prog.favs = (prog.favs||[]).filter(id => !dead.has(id)); // 清掉收藏
    bankUI.sel = {};
    persist(); render();
  }catch(e){ alert('删除失败：' + e); }
}

/* ================= 导入 ================= */
function importView(){
  return `<h1>📥 导入资料</h1>
  <div class="sub">上传含答案的 docx 文档，自动解析为题目进入题库（按题干去重，重复导入会更新旧题）。</div>
  <div class="drop" id="drop" onclick="$('file').click()">
    <div class="big-ico">📄</div>
    <div style="font-weight:800;color:var(--ink)">点击选择或拖入 .docx 文件</div>
    <div style="font-size:13px;margin-top:4px">支持多个文件同时导入</div>
    <input type="file" id="file" accept=".docx" multiple hidden onchange="doImport(this.files)">
  </div>
  <div class="flist" id="flist"></div>
  <div class="hint"><b>支持的格式</b>（和你的"答案文档"一样即可）：<br>
  1. 题干以「数字.」开头；选项以「A.」「B.」…开头（有 E 选项自动按答案判断单/多选）<br>
  2. 答案行写「【答案】C」或「【答案】ABCD」；解析行写「【解析】…」<br>
  3. 只发"题目文档"没有【答案】的题会被跳过——请导入带答案的版本<br>
  4. 每个导入的文件会作为一个独立章节，可在「🗂 题库汇总」中按章节检索、按题型批量删除</div>
  <a class="back" onclick="go('home')">← 返回首页</a>`;
}
async function doImport(files){
  const list = $('flist');
  files = [...files].sort((a,b)=>natCmp(a.name, b.name));   // 按文件名顺序导入, 题库即有序
  for(const f of files){
    const row = document.createElement('div');
    row.className = 'card fitem'; row.textContent = '⏳ ' + f.name + ' 解析中…';
    list.appendChild(row);
    try{
      const r = await (await fetch('/api/import', {method:'POST', body:f,
        headers:{'X-Filename': encodeURIComponent(f.name)}})).json();
      row.innerHTML = r.ok
        ? `<span class="ok">✓</span> ${esc(f.name)} — 解析 ${r.parsed} 题，<b>新增 ${r.added}</b>，更新 ${r.updated}，题库共 ${r.total} 题`
        : `<span class="err">✗</span> ${esc(f.name)} — ${esc(r.error||'解析失败')}`;
    }catch(e){ row.innerHTML = `<span class="err">✗</span> ${esc(f.name)} — ${e}`; }
  }
  bank = await (await fetch('/api/bank')).json();
  checkBadges(); persist();
}
async function loadAiStatus(){
  try{
    const st = await (await fetch('/api/aistatus')).json();
    for(const p of ['cloud','local']){
      const d = $('dot-'+p);
      if(d) d.className = 'dot-st ' + (st[p] ? 'up' : 'down');
    }
    const hint = $('provHint');
    if(hint && !st[cfg.provider])
      hint.textContent = cfg.provider==='local'
        ? '本地模型未启动：运行 ~/shuati/start_local_llm.sh'
        : '云端不可用，检查 codex-bridge 服务';
  }catch(e){}
}
function afterRender(){
  if(view === 'home') loadAiStatus();
  const drop = $('drop');
  if(!drop) return;
  ['dragover','dragenter'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('over')}));
  ['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('over')}));
  drop.addEventListener('drop', ev=>doImport(ev.dataTransfer.files));
}

/* ================= 特效 ================= */
function floatXp(text){
  const el = document.createElement('div');
  el.className = 'xp-float'; el.textContent = text;
  el.style.left = (innerWidth/2 - 30 + (Math.random()*60-30)) + 'px';
  el.style.top = (innerHeight/2) + 'px';
  document.body.appendChild(el); setTimeout(()=>el.remove(), 1000);
}
function confetti(){
  const colors = ['#4F46E5','#7C3AED','#16A34A','#D97706','#DC2626','#0EA5E9'];
  for(let i=0;i<60;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.background = colors[i%colors.length];
    c.style.left = Math.random()*innerWidth + 'px';
    c.style.top = '-12px';
    c.style.borderRadius = Math.random()>.5 ? '50%' : '2px';
    document.body.appendChild(c);
    const fall = c.animate([
      {transform:`translateY(0) rotate(0)`,opacity:1},
      {transform:`translateY(${innerHeight+40}px) rotate(${Math.random()*720-360}deg)`,opacity:.7}
    ], {duration:1800+Math.random()*1600, easing:'cubic-bezier(.2,.6,.4,1)'});
    fall.onfinish = ()=>c.remove();
  }
}
boot();
</script>
</body>
</html>
